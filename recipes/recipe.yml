---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
base-image: ghcr.io/ublue-os/bazzite-deck
description: Max's Bazzite Image
image-version: latest
name: bluemax
modules:
  - type: default-flatpaks
    configurations:
      - install:
          - com.github.zocker_160.SyncThingy
          - com.steamgriddb.steam-rom-manager
          - io.github.ryubing.Ryujinx
          - net.retrodeck.retrodeck
  - type: rpm-ostree
    install:
      - incus
      - incus-client
      - kde-partitionmanager
    remove:
      - fcitx5
      - fcitx5-chewing
      - fcitx5-chinese-addons
      - fcitx5-chinese-addons-data
      - fcitx5-configtool
      - fcitx5-data
      - fcitx5-gtk
      - fcitx5-gtk2
      - fcitx5-gtk3
      - fcitx5-gtk4
      - fcitx5-hangul
      - fcitx5-libs
      - fcitx5-libthai
      - fcitx5-lua
      - fcitx5-m17n
      - fcitx5-mozc
      - fcitx5-qt
      - fcitx5-qt-libfcitx5qt6widgets
      - fcitx5-qt-libfcitx5qtdbus
      - fcitx5-qt-qt6gui
      - fcitx5-qt5
      - fcitx5-qt6
      - fcitx5-sayura
      - fcitx5-unikey
      - filelight
      - gnome-disk-utility
      - hhd
      - hhd-ui
      - kcm-fcitx5
      - kfind
      - krdc
      - krdc-libs
      - krfb
      - krfb-libs
      - kwrite
      - libime
      - libime-data
      - ptyxis
      - rom-properties
      - rom-properties-common
      - rom-properties-kf6
      - rom-properties-thumbnailer-dbus
      - rom-properties-utils
      - webapp-manager
  - type: script
    snippets:
      - "curl -Lo /usr/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64"
      - "chmod +x /usr/bin/cloudflared"
      - "rm -f /usr/share/applications/bazzite-documentation.desktop"
      - "rm -f /usr/share/applications/bbrew.desktop"
      - "rm -f /usr/share/applications/discourse.desktop"
      - "rm -f /usr/share/applications/org.kde.kdebugsettings.desktop"
      - "rm -rf /usr/share/applications/steam"
  - type: systemd
    system:
      enabled:
        - incus.service
  - type: signing
