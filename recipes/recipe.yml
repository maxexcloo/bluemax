---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
base-image: ghcr.io/ublue-os/bazzite-deck
description: Max's Bazzite Image
image-version: latest
name: bluemax
modules:
  - type: rpm-ostree
    install:
      - incus
      - incus-client
    remove:
      # List packages included in Bazzite that you want to strip out
      - firefox # Example: Removing the RPM version if you prefer Flatpak
      - gnome-software # Example
  - type: systemd
    system:
      enabled:
        - incus.service
        - incus-lxcfs.service
  - type: signing
